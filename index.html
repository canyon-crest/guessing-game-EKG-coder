<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Number Guessing Game</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  
  <body>
    <audio id="correctSound" preload="auto"></audio>
    <audio id="incorrectSound" preload="auto"></audio>
    
    <p id="date"></p>

    <h3>Level</h3>
    <input type="radio" name="level" id="e" value="3" checked><label for="e">Easy</label>
    <input type="radio" name="level" id="m" value="10"><label for="m">Medium</label>
    <input type="radio" name="level" id="h" value="100"><label for="h">Hard</label>
    <input type="radio" name="level" id="ex" value="1000"><label for="ex">Extreme</label>

    <button id="playBtn">Play</button>

    <h3 id="msg">Select a Level</h3>
    <input type="text" id="guess">
    <button id="guessBtn" disabled>Guess</button>
    <button id="giveUpBtn" disabled>Give Up</button>

    <h3>Stats</h3>
    <p id="wins">Total wins: 0</p>
    <p id="avgScore">Average Score: </p>
    <p id="fastest">Fastest Game: </p>
    <p id="avgTime">Average Time: </p>

    <h3>Leaderboard</h3>
    <ol>
      <li name="leaderboard">-</li>
      <li name="leaderboard">-</li>
      <li name="leaderboard">-</li>
    </ol>

    <h3>Easy Leaderboard</h3>
    <ol>
      <li id="easy1">-</li>
      <li id="easy2">-</li>
      <li id="easy3">-</li>
    </ol>

    <h3>Medium Leaderboard</h3>
    <ol>
      <li id="medium1">-</li>
      <li id="medium2">-</li>
      <li id="medium3">-</li>
    </ol>

    <h3>Hard Leaderboard</h3>
    <ol>
      <li id="hard1">-</li>
      <li id="hard2">-</li>
      <li id="hard3">-</li>
    </ol>
  </body>
</html>
